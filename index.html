<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг сайтов</title>
    <style>
        
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --accent: #3b82f6;
            --card: #1e1e1e;
            --error: #ef4444;
            --success: #22c55e;
            --border: #2a2a2a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card);
            padding: 32px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { 
            font-size: 22px; 
            font-weight: 500; 
            margin: 0 0 24px 0; 
            text-align: center; 
        }
        input {
            width: 100%; 
            padding: 14px; 
            border: 1px solid var(--border);
            background: var(--bg); 
            color: #fff; 
            border-radius: 8px;
            box-sizing: border-box; 
            margin-bottom: 16px; 
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%; 
            padding: 14px; 
            border: none;
            background: var(--accent); 
            color: #fff; 
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        
        #results { margin-top: 24px; font-size: 14px; }
        .metric { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            padding-bottom: 12px; 
            border-bottom: 1px solid var(--border); 
        }
        .metric:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .status { font-weight: 600; }
        
        
        .loader { 
            text-align: center; 
            color: #888; 
            display: none; 
            font-size: 14px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Проверка производительности</h1>
        <input type="url" id="urlInput" placeholder="example.com" required>
        <button onclick="checkSite()">Анализировать</button>
        <div id="loader" class="loader">Анализ данных... (занимает ~10 секунд)</div>
        <div id="results"></div>
    </div>

    <script>
        async function checkSite() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!urlInput) {
                alert('Пожалуйста, введите адрес сайта');
                return;
            }

            // Форматируем URL
            let url = urlInput;
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            resultsDiv.innerHTML = '';
            loader.style.display = 'block';

            try {
                // Запрос к Google PageSpeed API
                const apiUrl = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&category=PERFORMANCE`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) throw new Error('Сайт не найден, отклонил запрос или вернул ошибку (404/500)');

                const data = await response.json();
                
                // Проверка на ошибку разрешения URL
                if (data.error) throw new Error(data.error.message);

                const lighthouse = data.lighthouseResult;
                const performanceScore = Math.round(lighthouse.categories.performance.score * 100);
                
                // Логика определения статуса
                let statusColor = 'var(--success)';
                let statusText = 'Работает отлично';

                if (performanceScore < 50) {
                    statusColor = 'var(--error)';
                    statusText = 'Сайт сильно перегружен';
                } else if (performanceScore < 80) {
                    statusColor = '#eab308'; // Желтый
                    statusText = 'Работает, но медленно';
                }

                resultsDiv.innerHTML = `
                    <div class="metric">
                        <span>Состояние:</span>
                        <span class="status" style="color: ${statusColor}">${statusText}</span>
                    </div>
                    <div class="metric">
                        <span>Оценка производительности:</span>
                        <span>${performanceScore} / 100</span>
                    </div>
                    <div class="metric">
                        <span>Отрисовка первого контента (FCP):</span>
                        <span>${lighthouse.audits['first-contentful-paint'].displayValue}</span>
                    </div>
                    <div class="metric">
                        <span>Время до интерактивности (TTI):</span>
                        <span>${lighthouse.audits['interactive'].displayValue}</span>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="metric" style="color: var(--error); border-bottom: none; display: block; text-align: center;">
                        ⚠️ ${error.message}
                    </div>
                `;
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
